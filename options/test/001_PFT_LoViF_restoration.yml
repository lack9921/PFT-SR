# =============================================================
# PFT-SR LoViF 2026 Restoration Testing (upscale=1)
# CVPR 2025 - Progressive Focused Transformer
# Run: python basicsr/test.py -opt options/test/001_PFT_LoViF_restoration.yml
# =============================================================
name: PFT_LoViF_AllTracks
model_type: PFTModel
scale: 1
num_gpu: 1
manual_seed: 42

# -----------------------------------------------------------
# Dataset - 5 tracks validation
# -----------------------------------------------------------
datasets:
  test_1:
    name: Blur
    type: PairedImageDataset
    dataroot_gt: /datasets_host/dataset/LoViF_val/Blur/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Blur/LQ
    io_backend:
      type: disk
    scale: 1

  test_2:
    name: Haze
    type: PairedImageDataset
    dataroot_gt: /datasets_host/dataset/LoViF_val/Haze/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Haze/LQ
    io_backend:
      type: disk
    scale: 1

  test_3:
    name: Lowlight
    type: PairedImageDataset
    dataroot_gt: /datasets_host/dataset/LoViF_val/Lowlight/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Lowlight/LQ
    io_backend:
      type: disk
    scale: 1

  test_4:
    name: Rain
    type: PairedImageDataset
    dataroot_gt: /datasets_host/dataset/LoViF_val/Rain/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Rain/LQ
    io_backend:
      type: disk
    scale: 1

  test_5:
    name: Snow
    type: PairedImageDataset
    dataroot_gt: /datasets_host/dataset/LoViF_val/Snow/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Snow/LQ
    io_backend:
      type: disk
    scale: 1

# -----------------------------------------------------------
# Network - must match training config exactly
# -----------------------------------------------------------
network_g:
  type: PFT
  upscale: 1
  in_chans: 3
  img_size: 64
  embed_dim: 90
  depths: [6, 6, 6, 6, 6, 6]
  num_heads: 6
  num_topk: [1024, 1024, 1024, 1024, 1024, 1024,
             256, 256, 256, 256, 256, 256,
             128, 128, 128, 128, 128, 128,
             64, 64, 64, 64, 64, 64,
             32, 32, 32, 32, 32, 32,
             16, 16, 16, 16, 16, 16]
  window_size: 16
  convffn_kernel_size: 5
  img_range: 1.
  mlp_ratio: 2.
  upsampler: ''
  resi_connection: '1conv'
  use_checkpoint: true

# -----------------------------------------------------------
# Path - point to your trained checkpoint
# -----------------------------------------------------------
path:
  pretrain_network_g: experiments/PFT_LoViF_AllTracks/training_states/60000.state
  strict_load_g: true
  param_key_g: ~
  resume_state: ~

# -----------------------------------------------------------
# Validation / Testing
# -----------------------------------------------------------
val:
  save_img: true
  suffix: ~

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

    lpips:
      type: calculate_lpips
      better: lower

# -----------------------------------------------------------
# Logging
# -----------------------------------------------------------
logger:
  print_freq: 1
  use_tb_logger: true
